                height: 24px;
                background: #000;

            0%, 100% { opacity: 0.6; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.05); }
        }
        .glowing-lock {
            animation: pulse-glow 2s infinite ease-in-out;
        }
        .wave-bar {
            animation: wave-bounce 1.2s ease-in-out infinite alternate;
        }
        @keyframes wave-bounce {

            top: -9999px;

        // ✏️ 替换区域：在这里填入你在 Supabase API 设置中复制的专属凭证！
        // =========================================================================
        const SUPABASE_URL = "https://ltxbsrgigjdoynmwwjac.supabase.co"; 
        const SUPABASE_ANON_KEY = "sb_publishable_4eFaEHWPJItrx6qjM5cyTw_toBvQcUl";
        
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let h5ClassData = {
            className: "",
            creatorName: "",
            isPaid: false, 
            classmates: []
        };
        
        let editingIndex = -1; 
        let cardToDeleteIndex = -1; 

        window.onload = function() {
            // 🚨 检查密钥是否被替换
            if (SUPABASE_ANON_KEY.includes("替换成你在")) {
                setTimeout(() => {
                    alert("⚠️ 警告：检测到你尚未在代码第 386 行填入 Supabase 密钥 (Anon key)，这将导致无法将数据保存到云端！");
                }, 1000);
            }

            const cache = localStorage.getItem('cyber_classmates_v1');
            if (cache) {
                const localMeta = JSON.parse(cache);
                h5ClassData.className = localMeta.className;
                h5ClassData.creatorName = localMeta.creatorName;
                h5ClassData.isPaid = localMeta.isPaid || false;
                initH5Classroom();
            } else {
                switchH5View('welcome');
            }
        };

        function switchH5View(viewId) {
            document.getElementById('view-welcome').classList.add('hidden');
            document.getElementById('view-wall').classList.add('hidden');
            document.getElementById('view-edit').classList.add('hidden');
            document.getElementById('footer-actions').classList.add('hidden');

            const viewNode = document.getElementById(`view-${viewId}`);
            if (viewNode) {
                viewNode.classList.remove('hidden');
            }
            if (viewId === 'wall') {
                document.getElementById('footer-actions').classList.remove('hidden');
            }
        }

        async function loadClassmatesFromCloud(classId) {
            const { data, error } = await supabaseClient
                .from('classmates')
                .select('*')
                .eq('class_id', classId)
                .order('created_at', { ascending: false });

            if (error) return null;

            return data.map(item => ({
                id: item.id,
                name: item.name,
                mbti: item.mbti,
                nickname: item.nickname,
                song: item.song,
                desc: item.desc_text,
                photo: item.photo_url
            }));
        }

        async function uploadToSupabaseBucket(base64Str, fileName) {
            try {
                const response = await fetch(base64Str);
                const blob = await response.blob();
                
                const safeName = encodeURIComponent(fileName.replace(/[^a-zA-Z0-9]/g, ''));
                const filePath = `classmates/${Date.now()}_${safeName}.jpg`;
                
                const { data, error } = await supabaseClient.storage
                    .from('photos')
                    .upload(filePath, blob, {
                        contentType: 'image/jpeg'
                    });

                if (error) {
                    alert(`🚨 【图片上传被云端拦截】\n\n原因：${error.message}`);
                    throw error;
                }

                const { data: { publicUrl } } = supabaseClient.storage
                    .from('photos')
                    .getPublicUrl(filePath);
                
                return publicUrl;
            } catch (err) {
                console.error(err);
                return "https://images.unsplash.com/photo-1511556532299-8f662fc26c06?w=400"; 
            }
        }

        async function createClassH5() {
            const classInput = document.getElementById('input-class-name').value.trim();
            const creatorInput = document.getElementById('input-creator-name').value.trim();

            if (!classInput || !creatorInput) {
                showH5Notification("⚠️ 请先填入班级名称和您的大名！");
                return;
            }

            h5ClassData.className = classInput;
            h5ClassData.creatorName = creatorInput;

            showH5Notification("📡 正在为您打开星空数据库舱门...");
            
            const classmates = await loadClassmatesFromCloud(classInput);
            
            if (classmates && classmates.length > 0) {
                h5ClassData.classmates = classmates;
                showH5Notification(`📁 已为您无缝同步云端数据！`);
            } else {
                h5ClassData.classmates = [];
                showH5Notification("✨ 全新班级云端舱门成功开启！");
            }

            saveH5DataToStorage();
            initH5Classroom();
        }

        async function initH5Classroom() {
            document.getElementById('header-class-name').textContent = `${h5ClassData.className}拍立得舱`;
            document.getElementById('wall-title-label').textContent = `${h5ClassData.className} · 毕业集结令`;
            document.getElementById('wall-creator-label').textContent = `由 班长 ${h5ClassData.creatorName} 组织建立`;
            
            const cloudData = await loadClassmatesFromCloud(h5ClassData.className);
            if (cloudData) {
                h5ClassData.classmates = cloudData;
            }
            
            document.getElementById('classmate-count').textContent = `${h5ClassData.classmates.length} 人入册`;

            renderClassmatesWall();
            switchH5View('wall');
        }

        function renderClassmatesWall() {
            const container = document.getElementById('wall-cards-container');
            container.innerHTML = "";

            if (h5ClassData.classmates.length === 0) {
                container.innerHTML = `
                    <div class="col-span-2 text-center py-16 text-slate-500 text-xs">
                        <i class="fa-solid fa-inbox text-3xl mb-3 text-slate-600 block"></i>
                        还没有同学录入呢，点击下方第一个上墙！
                    </div>
                `;
                return;
            }

            h5ClassData.classmates.forEach((item, index) => {
                const randomRotate = (index % 2 === 0 ? 1 : -1) * (1.5 + (index % 3) * 0.8);
                
                const card = document.createElement('div');
                card.className = "polaroid-item p-3 cursor-pointer select-none";
                card.style.transform = `rotate(${randomRotate}deg)`;
                
                card.innerHTML = `
                    <div class="w-full aspect-square overflow-hidden bg-slate-900 relative rounded-[2px]">
                        <img src="${item.photo}" class="w-full h-full object-cover">
                        <span class="absolute top-1.5 right-1.5 text-[8px] bg-[#0d0f1a]/90 backdrop-blur-md text-teal-400 font-extrabold px-2 py-0.5 rounded-full border border-teal-500/20 uppercase tracking-widest">
                            ${item.mbti}
                        </span>
                    </div>
                    <div class="mt-3.5 text-slate-900 text-left">
                        <div class="flex justify-between items-center">
                            <h4 class="text-xs font-black tracking-tight">${item.name}</h4>
                        </div>
                        <p class="text-[9px] text-slate-500 font-bold truncate mt-1"># ${item.nickname}</p>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        let uploadedPhotoBase64 = "";
        
        function triggerH5PhotoSelect() {
            document.getElementById('h5-file-input').click();
        }

        function handleH5PhotoSelect(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                uploadedPhotoBase64 = e.target.result;
                document.getElementById('h5-avatar-preview').src = uploadedPhotoBase64;
                document.getElementById('h5-avatar-preview').classList.remove('hidden');
                document.getElementById('h5-upload-placeholder').classList.add('hidden');
            };
            reader.readAsDataURL(file);
        }

        function showH5EditView() {
            editingIndex = -1; 
            document.getElementById('form-name').value = "";
            document.getElementById('form-nickname').value = "";
            document.getElementById('form-song').value = "";
            document.getElementById('form-desc').value = "";
            document.getElementById('h5-avatar-preview').classList.add('hidden');
            document.getElementById('h5-upload-placeholder').classList.remove('hidden');
            uploadedPhotoBase64 = "";
            switchH5View('edit');
        }

        // 保存并上传卡片数据至云端
        async function saveH5Card() {
            if (SUPABASE_ANON_KEY.includes("替换成你在")) {
                alert("🚨 【致命错误】你还没有替换代码里的 SUPABASE_ANON_KEY，无法连接云端！");
                return;
            }

            const name = document.getElementById('form-name').value.trim();
            const mbti = document.getElementById('form-mbti').value;
            const nickname = document.getElementById('form-nickname').value.trim() || "高三8班守护神";
            const song = document.getElementById('form-song').value.trim() || "五月天 - 《干杯》";
            const desc = document.getElementById('form-desc').value.trim();

            if (!name || !desc) {
                showH5Notification("⚠️ 请把姓名和毕业宣言填完整哦！");
                return;
            }

            showH5Notification("⏳ 正在向云端太空舱发射你的卡片...", 10000);

            let finalPhotoUrl = "https://images.unsplash.com/photo-1511556532299-8f662fc26c06?w=400";
            if (uploadedPhotoBase64) {
                if (uploadedPhotoBase64.startsWith("data:image")) {
                    finalPhotoUrl = await uploadToSupabaseBucket(uploadedPhotoBase64, name);
                } else {
                    finalPhotoUrl = uploadedPhotoBase64; 
                }
            }

            const cardData = {
                class_id: h5ClassData.className,
                name: name,
                mbti: mbti,
                nickname: nickname,
                song: song,
                desc_text: desc,
                photo_url: finalPhotoUrl
            };

            // 🚨 核心拦截监测区 🚨
            const { error } = await supabaseClient.from('classmates').insert([cardData]);
            
            if (error) {
                alert(`🚨 【数据库写入被云端拦截】\n\n错误信息：${error.message}\n错误代码：${error.code}\n\n可能是本地浏览器跨域拦截，或者云端权限未开放！`);
                showH5Notification(`❌ 上传失败，请查看弹窗报错！`, 6000);
                return;
            }

            showH5Notification("📸 录入成功！拍立得已实时同步至全班大屏幕！");

            saveH5DataToStorage();
            await initH5Classroom();

            document.getElementById('form-name').value = "";
            document.getElementById('h5-avatar-preview').classList.add('hidden');
            document.getElementById('h5-upload-placeholder').classList.remove('hidden');
            uploadedPhotoBase64 = "";
        }

        function saveH5DataToStorage() {
            const localMeta = {
                className: h5ClassData.className,
                creatorName: h5ClassData.creatorName,
                isPaid: h5ClassData.isPaid
            };
            localStorage.setItem('cyber_classmates_v1', JSON.stringify(localMeta));
        }

        function showH5Notification(text, duration = 3000) {
            const toast = document.createElement('div');
            toast.className = 'fixed top-6 left-1/2 -translate-x-1/2 w-[88%] max-w-[360px] bg-slate-950/95 border border-teal-500/30 text-teal-300 text-[11px] font-black tracking-wider py-3.5 px-5 rounded-2xl shadow-2xl z-[9999] transition-all duration-300 backdrop-blur-md text-center animate-fade-in';
            toast.textContent = text;
            document.body.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                setTimeout(() => toast.remove(), 300);
            }, duration);
        }
    </script>
</body>
